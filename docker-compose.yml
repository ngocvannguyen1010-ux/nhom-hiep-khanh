services:
  postgres:
    image: postgres:16-alpine
    container_name: nhom_hk_postgres
    environment:
      POSTGRES_USER: nhom
      POSTGRES_PASSWORD: nhom_dev_pw
      POSTGRES_DB: nhom_hiep_khanh
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nhom -d nhom_hiep_khanh"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
